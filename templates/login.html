<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Login SCADA</title>

    <link href="/static/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">

</head>

<body class="dashboard-body">

<main class="login-layout">
    <section class="panel login-panel">
        <p class="eyebrow text-center mb-1">SCADA MCFC</p>
        <h1 class="login-title">Celda Hidrogeno</h1>
        <p class="login-subtitle">Acceso operativo</p>

        <form method="POST" class="form-grid">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div>
                <label class="form-label">Usuario</label>
                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Usuario"
                    required
                    autocomplete="username"
                >
            </div>

            <div>
                <label class="form-label">Contraseña</label>
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="******"
                    required
                    autocomplete="current-password"
                >
            </div>

            <button type="submit" class="btn btn-success w-100">
                Entrar
            </button>
        </form>

        <p class="soft-text small text-center mb-0 mt-3">
            Celda de Hidrogeno v2.4 Luciano
        </p>
    </section>
</main>

</body>
</html>
