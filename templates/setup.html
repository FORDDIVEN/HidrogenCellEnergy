<!DOCTYPE html>
<html lang="es">

<head>

    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Configurar Administrador SCADA</title>

    <link href="/static/vendor/bootstrap/bootstrap.min.css" rel="stylesheet">
    <link href="/static/style.css" rel="stylesheet">

</head>

<body class="dashboard-body">

<main class="login-layout">
    <section class="panel login-panel">
        <p class="eyebrow text-center mb-1">SCADA MCFC</p>
        <h1 class="login-title">Primer Administrador</h1>
        <p class="login-subtitle">Configuracion inicial</p>

        <form method="POST" class="form-grid">
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <div>
                <label class="form-label">Usuario administrador</label>
                <input
                    type="text"
                    name="username"
                    class="form-control"
                    placeholder="Nombre de usuario"
                    required
                    autocomplete="username"
                >
            </div>

            <div>
                <label class="form-label">Contraseña</label>
                <input
                    type="password"
                    name="password"
                    class="form-control"
                    placeholder="Minimo 6 caracteres"
                    required
                    minlength="6"
                    autocomplete="new-password"
                >
            </div>

            <div>
                <label class="form-label">Confirmar contraseña</label>
                <input
                    type="password"
                    name="confirm_password"
                    class="form-control"
                    placeholder="Repite la contraseña"
                    required
                    minlength="6"
                    autocomplete="new-password"
                >
            </div>

            <button type="submit" class="btn btn-success w-100">
                Crear administrador
            </button>
        </form>
    </section>
</main>

</body>
</html>
